<!DOCTYPE html><html>
<head>
  <title>Backtest Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      color: #00ffae;
    }

    select, button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px;
    }

    button {
      background: #00ffae;
      cursor: pointer;
    }

    .summary {
      background: #1c2541;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .grid {
      display: grid;
      gap: 10px;
      margin-top: 15px;
    }

    .card {
      padding: 15px;
      border-radius: 12px;
      background: #1c2541;
      border-left: 5px solid gray;
    }

    .win {
      border-left-color: #00ffae;
    }

    .loss {
      border-left-color: #ff4d4d;
    }

    .loading {
      margin-top: 10px;
      padding: 10px;
      background: #1c2541;
      border-radius: 10px;
    }
  </style></head><body><div class="container">
  <h1>📊 Strategy Backtest</h1>Days:
<select id="days">
<option>5</option>
<option>10</option>
<option>15</option>
<option selected>30</option>
</select>

<button onclick="run()">Run</button>

  <div id="loading" class="loading"></div>
  <div id="summary"></div>
  <div id="trades" class="grid"></div>
</div><script>

async function run() {
  const days = document.getElementById("days").value;

  document.getElementById("loading").innerText = "Loading...";
  document.getElementById("trades").innerHTML = "";
  document.getElementById("summary").innerHTML = "";

  // ✅ DIRECT API CALL (NO PROXY)
  const url = "https://backtest-only.vercel.app/api/backtest?days=" + days;

  try {
    const res = await fetch(url);
    const data = await res.json();

    document.getElementById("loading").innerText = "";

    const trades = data.trades || [];

    let winPoints = 0;
    let lossPoints = 0;
    let equity = 0;
    let peak = 0;
    let maxDD = 0;

    trades.forEach(t => {
      const move = Math.abs(t.exitPrice - t.entry);

      if (t.exitType === "TP") {
        winPoints += move;
        equity += move;
      } else {
        lossPoints += move;
        equity -= move;
      }

      if (equity > peak) peak = equity;

      const dd = peak - equity;
      if (dd > maxDD) maxDD = dd;
    });

    const net = winPoints - lossPoints;

    document.getElementById("summary").innerHTML = `
      <div class="summary">
        Total: ${data.total} |
        Wins: ${data.wins} |
        Loss: ${data.losses} |
        Winrate: ${data.winrate}% <br><br>

        Win Points: ${winPoints.toFixed(2)} <br>
        Loss Points: ${lossPoints.toFixed(2)} <br>
        Net Points: ${net.toFixed(2)} <br>
        Max Drawdown: ${maxDD.toFixed(2)}
      </div>
    `;

    trades.forEach(t => {
      const points = (t.exitType === "TP")
        ? Math.abs(t.exitPrice - t.entry)
        : -Math.abs(t.exitPrice - t.entry);

      const card = document.createElement("div");

      card.className = "card " + (points > 0 ? "win" : "loss");

      card.innerHTML = `
        <b>${t.dir} | ${t.market}</b><br>
        Entry: ${t.entry}<br>
        Exit: ${t.exitPrice}<br>
        RR: ${t.rr}<br>
        Points: ${points.toFixed(2)}<br>
        Time: ${t.entryTime}
      `;

      document.getElementById("trades").appendChild(card);
    });

  } catch (e) {
    document.getElementById("loading").innerText = "❌ Error loading data";
    console.log(e);
  }
}

</script></body>
</html>
