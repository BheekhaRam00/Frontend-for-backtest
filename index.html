<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Backtest FIXED</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
}
.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}
button {
  padding:10px;
  background:#22c55e;
  border:none;
  color:white;
}
.card {
  background:#1e293b;
  padding:10px;
  margin:10px 0;
}
.win { border-left:5px solid green; }
.loss { border-left:5px solid red; }
</style>

</head>
<body>

<div class="container">

<h2>Backtest</h2>

<select id="days">
<option value="5">5</option>
<option value="10">10</option>
<option value="30" selected>30</option>
</select>

<button onclick="run()">Run</button>

<div id="output"></div>

</div>

<script>

const API = "https://backtest-only.vercel.app/api/backtest?days=";

async function run() {
  const days = document.getElementById("days").value;

  const res = await fetch(API + days);
  const text = await res.text();

  console.log("RAW:", text);

  const trades = extractTrades(text);

  render(trades);
}

// ============================
// 🔥 CORE FIX
// ============================
function extractTrades(text) {

  try {
    // find all trade objects manually
    const matches = text.match(/\{[^{}]*"entry"[^{}]*\}/g);

    if (!matches) return [];

    return matches.map(x => {
      try { return JSON.parse(x); }
      catch { return null; }
    }).filter(Boolean);

  } catch {
    return [];
  }
}

// ============================
// UI
// ============================
function render(trades) {

  const el = document.getElementById("output");
  el.innerHTML = "";

  if (!trades.length) {
    el.innerHTML = "❌ No trades parsed";
    return;
  }

  trades.forEach(t => {

    const pnl =
      t.dir === "CALL"
        ? t.exitPrice - t.entry
        : t.entry - t.exitPrice;

    const div = document.createElement("div");
    div.className = "card " + (t.exitType === "TP" ? "win" : "loss");

    div.innerHTML = `
      <b>${t.dir}</b><br>
      Entry: ${t.entry}<br>
      Exit: ${t.exitPrice}<br>
      PnL: ${pnl.toFixed(2)}
    `;

    el.appendChild(div);
  });
}

</script>

</body>
</html>
